document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

yle>\n  *{box-sizing:border-box}\n  html{scroll-behavior:smooth}\n  body{margin:0;background:#1F2B27}\n  ::selection{background:#3C766C;color:#F4EFE5}\n  @keyframes steamRise{\n    0%{transform:translateY(40px) scale(1);opacity:0}\n    18%{opacity:.55}\n    100%{transform:translateY(-220px) scale(1.7);opacity:0}\n  }\n  @keyframes driftSlow{\n    0%{transform:translateX(0)}\n    50%{transform:translateX(40px)}\n    100%{transform:translateX(0)}\n  }\n  @keyframes pulseDot{\n    0%{box-shadow:0 0 0 0 rgba(94,148,134,.55)}\n    70%{box-shadow:0 0 0 7px rgba(94,148,134,0)}\n    100%{box-shadow:0 0 0 0 rgba(94,148,134,0)}\n  }\n  @keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(7px)}}\n<\u002Fstyle>\n\n<\u002Fhelmet>\n\n<div style=\"--bg:#F1ECE2;--paper:#F8F4EC;--ink:#1F2B27;--muted:#5C6863;--spruce:#2E4B43;--teal:#3C766C;--aqua:#A9C9C1;--clay:#B98A5E;--sand:#E5DAC6;--line:#D9CEB9;font-family:'Mulish',-apple-system,sans-serif;color:var(--ink);background:var(--bg);overflow-x:hidden;-webkit-font-smoothing:antialiased;\">\n\n  <!-- HEADER -->\n  <header style=\"position:fixed;top:0;left:0;right:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:0 clamp(20px,4vw,52px);height:68px;background:rgba(241,236,226,.82);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border-bottom:1px solid rgba(217,206,185,.7);\">\n    <a href=\"#top\" style=\"display:flex;align-items:center;gap:11px;text-decoration:none;color:var(--ink);\">\n      <span style=\"display:inline-flex;width:24px;height:24px;align-items:center;justify-content:center;\">\n        <svg viewBox=\"0 0 24 24\" width=\"24\" height=\"24\" fill=\"none\" stroke=\"#3C766C\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"13\" r=\"3\"><\u002Fcircle><circle cx=\"12\" cy=\"13\" r=\"6.5\" opacity=\".55\"><\u002Fcircle><circle cx=\"12\" cy=\"13\" r=\"10\" opacity=\".28\"><\u002Fcircle><\u002Fsvg>\n      <\u002Fspan>\n      <span style=\"font-weight:600;font-size:13px;letter-spacing:.22em;text-transform:uppercase;\">Crystal Hot Springs<\u002Fspan>\n    <\u002Fa>\n    <nav style=\"display:flex;align-items:center;gap:clamp(14px,2.4vw,30px);\">\n      <a href=\"#waters\" style=\"text-decoration:none;color:var(--muted);font-size:13.5px;font-weight:500;letter-spacing:.04em;\">The Waters<\u002Fa>\n      <a href=\"#minerals\" style=\"text-decoration:none;color:var(--muted);font-size:13.5px;font-weight:500;letter-spacing:.04em;\">Minerals<\u002Fa>\n      <a href=\"#hours\" style=\"text-decoration:none;color:var(--muted);font-size:13.5px;font-weight:500;letter-spacing:.04em;\">Hours<\u002Fa>\n      <a href=\"#visit\" style=\"display:inline-flex;align-items:center;text-decoration:none;color:#F4EFE5;background:var(--spruce);font-size:13px;font-weight:600;letter-spacing:.05em;padding:9px 18px;border-radius:100px;\">Plan a visit<\u002Fa>\n    <\u002Fnav>\n  <\u002Fheader>\n\n  <!-- HERO -->\n  <section id=\"top\" style=\"position:relative;min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;padding:120px clamp(20px,5vw,80px) 0;background:linear-gradient(180deg,#F2ECE1 0%,#EAE1D1 28%,#C4D0C7 52%,#79A096 72%,#3C685F 88%,#2E4B43 100%);overflow:hidden;\">\n    <!-- steam -->\n    <sc-if value=\"{{ showSteam }}\" hint-placeholder-val=\"{{ true }}\">\n      <div aria-hidden=\"true\" style=\"position:absolute;inset:0;pointer-events:none;\">\n        <div style=\"position:absolute;left:14%;bottom:8%;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(255,253,248,.7),rgba(255,253,248,0) 68%);filter:blur(8px);animation:steamRise 11s ease-in-out infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:38%;bottom:4%;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,253,248,.6),rgba(255,253,248,0) 68%);filter:blur(10px);animation:steamRise 14s ease-in-out 2.4s infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:62%;bottom:9%;width:150px;height:150px;border-radius:50%;background:radial-gradient(circle,rgba(255,253,248,.62),rgba(255,253,248,0) 68%);filter:blur(8px);animation:steamRise 12.5s ease-in-out 1.2s infinite;\"><\u002Fdiv>\n        <div style=\"position:absolute;left:82%;bottom:5%;width:190px;height:190px;border-radius:50%;background:radial-gradient(circle,rgba(255,253,248,.55),rgba(255,253,248,0) 68%);filter:blur(11px);animation:steamRise 15s ease-in-out 3.6s infinite;\"><\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n\n    <div style=\"position:relative;max-width:1080px;margin:0 auto;width:100%;padding-bottom:clamp(48px,9vh,104px);\">\n      <div style=\"display:flex;align-items:center;gap:12px;margin-bottom:26px;\">\n        <span style=\"height:1px;width:34px;background:var(--clay);\"><\u002Fspan>\n        <span style=\"font-size:12.5px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;color:#7c6a52;\">Honeyville, Utah · Est. 1901<\u002Fspan>\n      <\u002Fdiv>\n      <h1 style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:clamp(46px,8.2vw,108px);line-height:.98;letter-spacing:-.01em;margin:0;color:#212e29;max-width:13ch;\">Soak in the world's most mineral-rich water.<\u002Fh1>\n      <p style=\"margin:30px 0 0;max-width:46ch;font-size:clamp(16px,1.5vw,19px);line-height:1.65;color:#33433d;font-weight:400;\">Where a hot spring and a cold spring meet, fifty feet apart, feeding pools that have welcomed soakers for over a century. {{ seasonNote }}<\u002Fp>\n      <div style=\"display:flex;flex-wrap:wrap;gap:14px;margin-top:38px;\">\n        <a href=\"#visit\" style=\"display:inline-flex;align-items:center;gap:9px;text-decoration:none;background:var(--spruce);color:#F4EFE5;font-size:14.5px;font-weight:600;letter-spacing:.03em;padding:15px 28px;border-radius:100px;\">Plan your visit\n          <svg viewBox=\"0 0 16 16\" width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 8h9M8 3.5 12.5 8 8 12.5\"><\u002Fpath><\u002Fsvg>\n        <\u002Fa>\n        <a href=\"#hours\" style=\"display:inline-flex;align-items:center;text-decoration:none;background:rgba(255,255,255,.4);border:1px solid rgba(46,75,67,.32);color:#243530;font-size:14.5px;font-weight:600;letter-spacing:.03em;padding:15px 26px;border-radius:100px;backdrop-filter:blur(4px);\">View hours<\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div aria-hidden=\"true\" style=\"position:absolute;left:50%;bottom:24px;transform:translateX(-50%);color:rgba(244,239,229,.85);animation:bob 2.6s ease-in-out infinite;\">\n      <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M6 9.5 12 15.5 18 9.5\"><\u002Fpath><\u002Fsvg>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- INTRO STATEMENT -->\n  <section style=\"background:var(--bg);padding:clamp(80px,12vh,150px) clamp(20px,5vw,80px);\">\n    <div style=\"max-width:920px;margin:0 auto;\">\n      <span style=\"font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--clay);\">A rare convergence<\u002Fspan>\n      <p style=\"font-family:'Cormorant Garamond',Georgia,serif;font-weight:300;font-size:clamp(26px,3.6vw,44px);line-height:1.32;letter-spacing:-.005em;margin:24px 0 0;color:var(--ink);text-wrap:pretty;\">Crystal sits at the meeting of a hot spring and a cold spring — heated deep in the earth, surfacing at <span style=\"color:var(--teal);\">120–134°F<\u002Fspan>, then blended with cool water until every pool is the perfect temperature to sink into.<\u002Fp>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- STATS -->\n  <section style=\"background:var(--paper);border-top:1px solid var(--line);border-bottom:1px solid var(--line);padding:clamp(54px,7vh,80px) clamp(20px,5vw,80px);\">\n    <div style=\"max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(210px,1fr));gap:clamp(28px,4vw,56px);\">\n      <div>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(40px,5vw,62px);line-height:1;color:var(--teal);\">46,000<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:13.5px;line-height:1.5;color:var(--muted);font-weight:500;\">mg/L of dissolved minerals — the highest content of any hot spring on earth.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(40px,5vw,62px);line-height:1;color:var(--teal);\">22,000<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:13.5px;line-height:1.5;color:var(--muted);font-weight:500;\">years old — a spring that has been flowing since the last ice age.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(40px,5vw,62px);line-height:1;color:var(--teal);\">8,000<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:13.5px;line-height:1.5;color:var(--muted);font-weight:500;\">gallons of fresh mineral water rise to the surface every five minutes.<\u002Fdiv>\n      <\u002Fdiv>\n      <div>\n        <div style=\"font-family:'Cormorant Garamond',serif;font-weight:400;font-size:clamp(40px,5vw,62px);line-height:1;color:var(--teal);\">1901<\u002Fdiv>\n        <div style=\"margin-top:10px;font-size:13.5px;line-height:1.5;color:var(--muted);font-weight:500;\">the year these waters first opened to guests — and never stopped.<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- WATERS / POOLS -->\n  <section id=\"waters\" style=\"background:var(--bg);padding:clamp(80px,12vh,150px) clamp(20px,5vw,80px);\">\n    <div style=\"max-width:1180px;margin:0 auto;\">\n      <div style=\"max-width:620px;\">\n        <span style=\"font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--clay);\">The Waters<\u002Fspan>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,5vw,60px);line-height:1.04;margin:18px 0 0;color:var(--ink);\">Choose your temperature.<\u002Fh2>\n        <p style=\"margin:18px 0 0;font-size:16px;line-height:1.65;color:var(--muted);max-width:52ch;\">Seven distinct pools, from cool freshwater to a deep, soothing soak. Move between them at your own pace — most guests linger for an hour or two.<\u002Fp>\n      <\u002Fdiv>\n\n      <!-- temperature ribbon -->\n      <div style=\"margin:42px 0 8px;\">\n        <div style=\"height:8px;border-radius:100px;background:linear-gradient(90deg,#6FA8B5 0%,#7FB0A0 30%,#A9C9C1 46%,#D9C7A6 64%,#C99A6A 82%,#B5703F 100%);\"><\u002Fdiv>\n        <div style=\"display:flex;justify-content:space-between;margin-top:8px;font-size:11.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);font-weight:600;\">\n          <span>65°F · Cool<\u002Fspan><span>Warm soak<\u002Fspan><span>105°F · Hot<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div style=\"margin-top:38px;display:grid;grid-template-columns:repeat(auto-fit,minmax(248px,1fr));gap:18px;\">\n        <!-- card -->\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #B5703F;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#B5703F;\">102–105°F<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">Three Hot Tubs<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">Bubbling jetted warmth for a small group — the hottest, most restorative spot on site.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #C0834E;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#C0834E;\">100–104°F<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">The Soaking Pools<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">Two quieter, hotter pools fed straight from the blended mineral source — pure soak.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #3C766C;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#3C766C;\">~94°F<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">Olympic Pool<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">The wide-open heart of the resort — room to swim, float, play and gather.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #4F8E89;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#4F8E89;\">Lengths<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">The Lap Pool<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">For swimmers who want to put in real lengths in mineral-warmed water.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #6FA8B5;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#6FA8B5;\">65–75°F<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">Freshwater Cooler Pool<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">A crisp freshwater plunge to cool off between soaks — best in the summer heat.<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--paper);border:1px solid var(--line);border-top:2px solid #5C97A3;border-radius:3px;padding:26px 24px;\">\n          <span style=\"font-size:12px;font-weight:700;letter-spacing:.12em;color:#5C97A3;\">360 ft · seasonal<\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:27px;margin:9px 0 8px;color:var(--ink);\">Two Water Slides<\u002Fh3>\n          <p style=\"margin:0;font-size:14px;line-height:1.6;color:var(--muted);\">A pair of 360-foot rides for a jolt of fun. {{ slidesNote }}<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- MINERALS (dark band) -->\n  <section id=\"minerals\" style=\"position:relative;background:var(--spruce);color:#EDE6D8;padding:clamp(82px,13vh,160px) clamp(20px,5vw,80px);overflow:hidden;\">\n    <div style=\"position:absolute;top:-120px;right:-80px;width:420px;height:420px;border-radius:50%;background:radial-gradient(circle,rgba(169,201,193,.16),transparent 70%);animation:driftSlow 18s ease-in-out infinite;pointer-events:none;\"><\u002Fdiv>\n    <div style=\"position:relative;max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(40px,6vw,90px);align-items:start;\">\n      <div>\n        <span style=\"font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--aqua);\">Minerals &amp; Wellbeing<\u002Fspan>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,5vw,58px);line-height:1.05;margin:18px 0 0;color:#F4EFE5;\">Water you can feel on your skin.<\u002Fh2>\n        <p style=\"margin:22px 0 0;font-size:16px;line-height:1.7;color:#C9D2CB;max-width:48ch;\">An average hot spring carries about 1,000 mg/L of dissolved minerals. Crystal carries roughly <strong style=\"color:#F4EFE5;font-weight:600;\">forty-six times more<\u002Fstrong> — calcium, magnesium, potassium and over sixty trace elements that soakers have sought out for generations.<\u002Fp>\n        <div style=\"display:flex;flex-wrap:wrap;gap:9px;margin-top:28px;\">\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">Calcium<\u002Fspan>\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">Magnesium<\u002Fspan>\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">Potassium<\u002Fspan>\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">Sodium<\u002Fspan>\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">Sulfate<\u002Fspan>\n          <span style=\"border:1px solid rgba(169,201,193,.4);color:#D6DED7;font-size:12.5px;font-weight:600;letter-spacing:.04em;padding:7px 14px;border-radius:100px;\">+ 60 trace elements<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex;flex-direction:column;gap:2px;\">\n        <div style=\"display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(169,201,193,.22);\">\n          <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--aqua);min-width:28px;\">01<\u002Fspan>\n          <div><div style=\"font-weight:600;font-size:16px;color:#F4EFE5;\">Eases tired muscles<\u002Fdiv><div style=\"font-size:13.5px;color:#B7C1Ba;margin-top:4px;line-height:1.55;\">Warm mineral water helps loosen tension and soothe aching joints.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(169,201,193,.22);\">\n          <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--aqua);min-width:28px;\">02<\u002Fspan>\n          <div><div style=\"font-weight:600;font-size:16px;color:#F4EFE5;\">Supports circulation<\u002Fdiv><div style=\"font-size:13.5px;color:#B7C1Ba;margin-top:4px;line-height:1.55;\">Heat and buoyancy encourage blood flow and a deep sense of ease.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;padding:20px 0;border-bottom:1px solid rgba(169,201,193,.22);\">\n          <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--aqua);min-width:28px;\">03<\u002Fspan>\n          <div><div style=\"font-weight:600;font-size:16px;color:#F4EFE5;\">Soothes the skin<\u002Fdiv><div style=\"font-size:13.5px;color:#B7C1Ba;margin-top:4px;line-height:1.55;\">Mineral-dense water many guests find leaves skin feeling soft and renewed.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"display:flex;gap:16px;padding:20px 0;\">\n          <span style=\"font-family:'Cormorant Garamond',serif;font-size:22px;color:var(--aqua);min-width:28px;\">04<\u002Fspan>\n          <div><div style=\"font-weight:600;font-size:16px;color:#F4EFE5;\">Quiets the mind<\u002Fdiv><div style=\"font-size:13.5px;color:#B7C1Ba;margin-top:4px;line-height:1.55;\">Steam, warmth and open sky — the oldest kind of rest there is.<\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- HOURS + GOOD TO KNOW -->\n  <section id=\"hours\" style=\"background:var(--bg);padding:clamp(80px,12vh,150px) clamp(20px,5vw,80px);\">\n    <div style=\"max-width:1120px;margin:0 auto;display:grid;grid-template-columns:repeat(auto-fit,minmax(300px,1fr));gap:clamp(32px,5vw,72px);align-items:start;\">\n      <div>\n        <div style=\"display:flex;align-items:center;gap:14px;flex-wrap:wrap;\">\n          <span style=\"font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--clay);\">Hours<\u002Fspan>\n          <sc-if value=\"{{ showStatus }}\" hint-placeholder-val=\"{{ true }}\">\n            <span style=\"display:inline-flex;align-items:center;gap:8px;background:var(--paper);border:1px solid var(--line);padding:5px 12px 5px 10px;border-radius:100px;font-size:12.5px;font-weight:600;color:var(--spruce);\">\n              <sc-if value=\"{{ isOpen }}\" hint-placeholder-val=\"{{ true }}\"><span style=\"width:8px;height:8px;border-radius:50%;background:#5E9486;animation:pulseDot 2.2s infinite;\"><\u002Fspan><\u002Fsc-if>\n              <sc-if value=\"{{ closedNow }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"width:8px;height:8px;border-radius:50%;background:#B9926B;\"><\u002Fspan><\u002Fsc-if>\n              {{ statusLabel }}\n            <\u002Fspan>\n          <\u002Fsc-if>\n        <\u002Fdiv>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,5vw,58px);line-height:1.05;margin:18px 0 28px;color:var(--ink);\">Open year-round.<\u002Fh2>\n        <div style=\"border-top:1px solid var(--line);\">\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:16px 2px;border-bottom:1px solid var(--line);\"><span style=\"font-size:15px;font-weight:600;color:var(--ink);\">Monday – Thursday<\u002Fspan><span style=\"font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;\">12:00 PM – 10:00 PM<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:16px 2px;border-bottom:1px solid var(--line);\"><span style=\"font-size:15px;font-weight:600;color:var(--ink);\">Friday – Saturday<\u002Fspan><span style=\"font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;\">12:00 PM – 11:00 PM<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;justify-content:space-between;align-items:baseline;padding:16px 2px;border-bottom:1px solid var(--line);\"><span style=\"font-size:15px;font-weight:600;color:var(--ink);\">Sunday<\u002Fspan><span style=\"font-size:15px;color:var(--muted);font-variant-numeric:tabular-nums;\">12:00 PM – 8:00 PM<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <p style=\"margin:18px 0 0;font-size:13px;line-height:1.55;color:var(--muted);font-style:italic;\">Hours shift with the season. Please call ahead to confirm before you make the drive.<\u002Fp>\n      <\u002Fdiv>\n\n      <div style=\"background:var(--paper);border:1px solid var(--line);border-radius:4px;padding:clamp(28px,3.5vw,40px);\">\n        <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:26px;margin:0 0 22px;color:var(--ink);\">Good to know<\u002Fh3>\n        <div style=\"display:flex;flex-direction:column;gap:18px;\">\n          <div style=\"display:flex;gap:13px;align-items:flex-start;\"><span style=\"color:var(--teal);margin-top:2px;flex-shrink:0;\"><svg viewBox=\"0 0 16 16\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 8.5 6.5 12 13 4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:14.5px;line-height:1.55;color:#3a4641;\">Swimsuits are required in every pool. Suits and towels are available to rent on site.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;align-items:flex-start;\"><span style=\"color:var(--teal);margin-top:2px;flex-shrink:0;\"><svg viewBox=\"0 0 16 16\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 8.5 6.5 12 13 4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:14.5px;line-height:1.55;color:#3a4641;\">Children 2 and under are always free. Day passes are counted per person.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;align-items:flex-start;\"><span style=\"color:var(--teal);margin-top:2px;flex-shrink:0;\"><svg viewBox=\"0 0 16 16\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 8.5 6.5 12 13 4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:14.5px;line-height:1.55;color:#3a4641;\">No outside food inside the facility. No alcohol, glass containers, or pets.<\u002Fspan><\u002Fdiv>\n          <div style=\"display:flex;gap:13px;align-items:flex-start;\"><span style=\"color:var(--teal);margin-top:2px;flex-shrink:0;\"><svg viewBox=\"0 0 16 16\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.6\"><path d=\"M3 8.5 6.5 12 13 4.5\"><\u002Fpath><\u002Fsvg><\u002Fspan><span style=\"font-size:14.5px;line-height:1.55;color:#3a4641;\">Flat, drive-up access throughout — only a short, level walk from the lot to the water.<\u002Fspan><\u002Fdiv>\n        <\u002Fdiv>\n        <a href=\"tel:14353390038\" style=\"display:inline-flex;align-items:center;gap:9px;margin-top:28px;text-decoration:none;background:var(--spruce);color:#F4EFE5;font-size:14px;font-weight:600;padding:13px 22px;border-radius:100px;\">\n          <svg viewBox=\"0 0 16 16\" width=\"14\" height=\"14\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.5\"><path d=\"M3 3.5c0 5 4.5 9.5 9.5 9.5l.5-2.5-3-1L9 11A8 8 0 0 1 5 7l1.5-1-1-3z\"><\u002Fpath><\u002Fsvg>\n          Call for current rates\n        <\u002Fa>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- VISIT -->\n  <section id=\"visit\" style=\"background:var(--paper);border-top:1px solid var(--line);padding:clamp(80px,12vh,150px) clamp(20px,5vw,80px);\">\n    <div style=\"max-width:1120px;margin:0 auto;\">\n      <div style=\"text-align:center;max-width:640px;margin:0 auto 56px;\">\n        <span style=\"font-size:12px;font-weight:600;letter-spacing:.3em;text-transform:uppercase;color:var(--clay);\">Plan Your Visit<\u002Fspan>\n        <h2 style=\"font-family:'Cormorant Garamond',serif;font-weight:300;font-size:clamp(34px,5vw,60px);line-height:1.04;margin:18px 0 0;color:var(--ink);\">Easy to reach, hard to leave.<\u002Fh2>\n        <p style=\"margin:18px 0 0;font-size:16px;line-height:1.65;color:var(--muted);\">Just 1.8 miles off I-15 — about 70 miles north of Salt Lake City and 30 minutes from Logan.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:18px;\">\n        <div style=\"background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:30px 26px;\">\n          <span style=\"color:var(--teal);\"><svg viewBox=\"0 0 20 20\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M10 18s6-5.2 6-10A6 6 0 0 0 4 8c0 4.8 6 10 6 10z\"><\u002Fpath><circle cx=\"10\" cy=\"8\" r=\"2.2\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:22px;margin:14px 0 8px;color:var(--ink);\">Find us<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:var(--muted);\">8215 N Highway 38<br>Honeyville, UT 84314<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:30px 26px;\">\n          <span style=\"color:var(--teal);\"><svg viewBox=\"0 0 20 20\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M3 4.5C3 11 9 17 15.5 17l.5-3-3.2-1.1-1.3 1.6A11 11 0 0 1 6.5 9.5l1.6-1.3L7 5 4 4.5z\"><\u002Fpath><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:22px;margin:14px 0 8px;color:var(--ink);\">Call ahead<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:var(--muted);\"><a href=\"tel:14353390038\" style=\"color:var(--teal);text-decoration:none;font-weight:600;\">(435) 339-0038<\u002Fa><br>For hours, rates &amp; group visits<\u002Fp>\n        <\u002Fdiv>\n        <div style=\"background:var(--bg);border:1px solid var(--line);border-radius:4px;padding:30px 26px;\">\n          <span style=\"color:var(--teal);\"><svg viewBox=\"0 0 20 20\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"1.4\"><path d=\"M2.5 13 5 5.5h10L17.5 13M4 13h12v3.5H4zM6 16.5v1.2M14 16.5v1.2\"><\u002Fpath><circle cx=\"6.5\" cy=\"13\" r=\"0\"><\u002Fcircle><\u002Fsvg><\u002Fspan>\n          <h3 style=\"font-family:'Cormorant Garamond',serif;font-weight:500;font-size:22px;margin:14px 0 8px;color:var(--ink);\">Getting here<\u002Fh3>\n          <p style=\"margin:0;font-size:14.5px;line-height:1.6;color:var(--muted);\">I-15 to Exit 372, then 1.8 miles. Free parking and flat, drive-up access.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- FOOTER -->\n  <footer style=\"background:var(--spruce);color:#C9D2CB;padding:clamp(54px,7vh,80px) clamp(20px,5vw,80px) 40px;\">\n    <div style=\"max-width:1120px;margin:0 auto;display:flex;flex-wrap:wrap;gap:40px;justify-content:space-between;align-items:flex-start;\">\n      <div style=\"max-width:340px;\">\n        <div style=\"display:flex;align-items:center;gap:11px;margin-bottom:16px;\">\n          <svg viewBox=\"0 0 24 24\" width=\"22\" height=\"22\" fill=\"none\" stroke=\"#A9C9C1\" stroke-width=\"1.5\"><circle cx=\"12\" cy=\"13\" r=\"3\"><\u002Fcircle><circle cx=\"12\" cy=\"13\" r=\"6.5\" opacity=\".55\"><\u002Fcircle><circle cx=\"12\" cy=\"13\" r=\"10\" opacity=\".28\"><\u002Fcircle><\u002Fsvg>\n          <span style=\"font-weight:600;font-size:13px;letter-spacing:.22em;text-transform:uppercase;color:#F4EFE5;\">Crystal Hot Springs<\u002Fspan>\n        <\u002Fdiv>\n        <p style=\"margin:0;font-size:14px;line-height:1.7;color:#A9B4AD;\">A natural mineral hot spring in Honeyville, Utah — welcoming soakers since 1901.<\u002Fp>\n      <\u002Fdiv>\n      <div style=\"display:flex;gap:56px;flex-wrap:wrap;\">\n        <div>\n          <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--aqua);font-weight:600;margin-bottom:14px;\">Visit<\u002Fdiv>\n          <a href=\"#waters\" style=\"display:block;text-decoration:none;color:#C9D2CB;font-size:14px;margin-bottom:9px;\">The Waters<\u002Fa>\n          <a href=\"#minerals\" style=\"display:block;text-decoration:none;color:#C9D2CB;font-size:14px;margin-bottom:9px;\">Minerals<\u002Fa>\n          <a href=\"#hours\" style=\"display:block;text-decoration:none;color:#C9D2CB;font-size:14px;margin-bottom:9px;\">Hours<\u002Fa>\n          <a href=\"#visit\" style=\"display:block;text-decoration:none;color:#C9D2CB;font-size:14px;\">Directions<\u002Fa>\n        <\u002Fdiv>\n        <div>\n          <div style=\"font-size:11.5px;letter-spacing:.2em;text-transform:uppercase;color:var(--aqua);font-weight:600;margin-bottom:14px;\">Contact<\u002Fdiv>\n          <p style=\"margin:0 0 9px;font-size:14px;color:#C9D2CB;line-height:1.6;\">8215 N Highway 38<br>Honeyville, UT 84314<\u002Fp>\n          <a href=\"tel:14353390038\" style=\"text-decoration:none;color:#F4EFE5;font-size:14px;font-weight:600;\">(435) 339-0038<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div style=\"max-width:1120px;margin:44px auto 0;padding-top:22px;border-top:1px solid rgba(169,201,193,.2);display:flex;flex-wrap:wrap;gap:14px;justify-content:space-between;align-items:center;\">\n      <span style=\"font-size:12.5px;color:#8F9A93;\">© 2026 Crystal Hot Springs. All rights reserved.<\u002Fspan>\n      <span style=\"font-size:11.5px;letter-spacing:.08em;color:#8F9A93;text-transform:uppercase;\">No outside food · No camping services<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Ffooter>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;season&quot;:{&quot;editor&quot;:&quot;enum&quot;,&quot;options&quot;:[&quot;Summer&quot;,&quot;Winter&quot;],&quot;default&quot;:&quot;Summer&quot;,&quot;tsType&quot;:&quot;string&quot;},&quot;showSteam&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;},&quot;showStatus&quot;:{&quot;editor&quot;:&quot;boolean&quot;,&quot;default&quot;:true,&quot;tsType&quot;:&quot;boolean&quot;}}\">\nclass Component extends DCLogic {\n  renderVals() {\n    const season = this.props.season ?? 'Summer';\n    const showSteam = this.props.showSteam ?? true;\n    const showStatus = this.props.showStatus ?? true;\n\n    const now = new Date();\n    const day = now.getDay();\n    const h = now.getHours() + now.getMinutes() / 60;\n    const closeMap = { 0: 20, 1: 22, 2: 22, 3: 22, 4: 22, 5: 23, 6: 23 };\n    const isOpen = h >= 12 && h < closeMap[day];\n\n    const seasonNote = season === 'Winter'\n      ? 'In winter, steam pours off the pools against the snow — and the soak feels even better.'\n      : 'Through summer the slides run daily and the evenings stay open late.';\n    const slidesNote = season === 'Winter'\n      ? 'Closed for the winter season.'\n      : 'Open daily through the summer.';\n\n    return {\n      showSteam, showStatus, season,\n      isOpen, closedNow: !isOpen,\n      statusLabel: isOpen ? 'Open now' : 'Closed now',\n      seasonNote, slidesNote,\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
